<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Styled To-Do List</title>
    <link rel="stylesheet" href="styles.css">
</head>
<div>
    <h1>My To-Do List</h1>
    <ul class="todo-list">
        <li>
            <label for="task1">
                <input type="checkbox" id="task1" name="task1"> Take the daughter to school.
            </label>
            <ul class="sub-item">
                <li>
                    <a class="sub-item-link" href="#" target="_blank"> Map to schol</a>
                </li>
            </ul>
        </li>
        <li>
            <label for="task2">
                <input type="checkbox" id="task2" name="task2"> Go to the Gym
            </label>
            <ul class="sub-item">
                <li>
                    <a class="sub-item-link" href="#" target="_blank">Strength Training</a>
                </li>
            </ul>
        </li>
        <li>
            <label for="task3">
                <input type="checkbox" id="task3" name="task3"> Study fullstack development on freeCodeCamp.
            </label>
            <ul class="sub-item">
                <li>
                    <a class="sub-item-link" href="#" target="_blank">freeCodeCamp</a>
                </li>
            </ul>
        </li>
        <li>
            <label for="task4">
                <input type="checkbox" id="task4" name="task4"> Pick up the daughter from school, take her to swimming class, and pick up the wife from work.
            </label>
            <ul class="sub-item">
                <li>
                    <a class="sub-item-link" href="#" target="_blank">Map to swimming class and work</a>
                </li>
            </ul>
        </li>
    </ul>
</div>

<body>

</body>

</html>
