<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Survey Form</title>
  </head>

  <body>
    <main>
      <header>
        <h1 id="title">freeCodeCamp Survey Form</h1>
        <p id="description">Thank you for taking the time to help us improve the platform</p>
      </header>
      <form id="survey-form">
        <label for="name" id="name-label">Name:</label>
        <input type="text" id="name" name="name" placeholder="Ex. Kaue Rodrigues" size="20" required><br>
        <label for="email" id="email-label">Email: </label>
        <input type="email" id="email" name:"email" placeholder="Ex. example@example.com" size="20" required><br>
        <label for="number" id="number-label">Age:(opitional)</label>
        <input type="number" id="number" name="number" placeholder="Ex. 45" min="3" max="100"><br>
        <label for="dropdown">Which option best describes your current role?</label>
        <select id="dropdown" name="dropdown">
          <option value="student">Student</option>
          <option value="full-time-job">Full Time Job</option>
          <option value="full-time-learner">Full Time Learner</option>
          <option value="prefer-not-to-say">Prefer Not To Say</option>
          <option value="other" selected>Other</option>
        </select>
        <fieldset>
          <legend>Would you recommend freeCodeCamp to a friend?</legend>
           <label for="definitely ">Definitely </label>
          <input type="radio" value="definitely" name="definitely" checked>
          <label for="maybe">Maybe</label>
          <input type="radio" value="maybe" name="maybe">
          <label for="not-sure">Not sure</label>
          <input type="radio" value="not-sure" name="not-sure">
        </fieldset>
         <fieldset>
          <legend>Would you recommend freeCodeCamp to a friend?</legend>
           <label for="definitely ">Definitely </label>
          <input type="radio" value="definitely" name="definitely" checked>
          <label for="maybe">Maybe</label>
          <input type="radio" value="maybe" name="maybe">
          <label for="not-sure">Not sure</label>
          <input type="radio" value="not-sure" name="not-sure">
        </fieldset>
        <fieldset>
        <legend>What would you like to see improved? (Check all that apply)</legend>
        <label for="frontend">Front-end Projects</label>
        <input type="checkbox" id="frontend" name="frontend" value="frontend">
         <label for="backend">Back-end Projects</label>
        <input type="checkbox" id="backend" name="backend" value="backend">
         <label for="data-visualization">Data Visualization</label>
        <input type="checkbox" id="data-visualization" name="data-visualization" value="data-visualization">
        <label for="challenges">Challenges</label>
        <input type="checkbox" id="challenges" name="challenges" value="challenges">
        </fieldset>
        <label for="comments">Any comments or suggestions?</label>
        <textarea cols="30" rows="05" id="comments" name="comments" placeholder="Enter your comment here..."></textarea>
        <button type="submit" id="submit">Submit</button>
      </form>
    </main>
  </body>
</html>
